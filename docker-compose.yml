version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clipworks
      POSTGRES_USER: clipworks
      POSTGRES_PASSWORD: clipworks
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  renderer:
    build: ./services/renderer
    environment:
      - ASSETS_DIR=/app/data/assets
    volumes:
      - ./data/assets:/app/data/assets
    ports:
      - "8001:8000"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://clipworks:clipworks@postgres:5432/clipworks
      REDIS_URL: redis://redis:6379/0
      RENDERER_URL: http://renderer:8000
    volumes:
      - ./backend:/app
      - ./data/assets:/app/data/assets
    depends_on:
      - postgres
      - redis
      - renderer
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
