<title>ClipWorks Video</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  #stage {
    position: relative; width: 1920px; height: 1080px;
    overflow: hidden; background: #0f0f1a;
    font-family: 'Noto Sans CJK SC','PingFang SC','Microsoft YaHei',sans-serif;
  }
  .scene { position: absolute; inset: 0; overflow: hidden; opacity: 0; }
  .bg-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .kb { animation: kenburns 12s ease-in-out infinite alternate; transform-origin: center; }
  .scrim { position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.10) 0%, rgba(0,0,0,0.55) 100%); }
  .copy { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 86px; text-align: center; z-index: 10; }
  .headline { color: #fff; font-weight: 800; line-height: 1.2;
    font-size: 81px; text-shadow: 0 4px 24px rgba(0,0,0,0.6);
    opacity: 0; animation: textReveal 0.9s ease-out 0.25s forwards; }
  .sub { margin-top: 32px; color: #e5e7eb; font-weight: 600;
    font-size: 43px; text-shadow: 0 2px 16px rgba(0,0,0,0.6);
    opacity: 0; animation: textReveal 0.9s ease-out 0.55s forwards; }
  @keyframes kenburns { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
  @keyframes textReveal {
    0% { opacity: 0; transform: translateY(28px); filter: blur(8px); }
    100% { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  @keyframes sceneFade {
    0% { opacity: 0; } 2% { opacity: 1; } 96% { opacity: 1; } 100% { opacity: 0; }
  }
  @keyframes sceneSlide {
    0% { opacity: 0; transform: translateX(6%); } 3% { opacity: 1; transform: translateX(0); }
    96% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(-6%); }
  }
  @keyframes sceneZoom {
    0% { opacity: 0; transform: scale(1.12); } 4% { opacity: 1; transform: scale(1); }
    96% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.94); }
  }
  .lower-third { position: absolute; left: 76px; bottom: 64px;
    padding: 12px 38px; background: rgba(0,0,0,0.45);
    border-left: 11px solid; border-radius: 6px;
    color: #fff; font-weight: 700; font-size: 30px; z-index: 50;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5); opacity: 0; animation: textReveal 0.7s ease-out 0.7s forwards; }

  /* ---- 视觉增强装饰元素 ---- */
  .matrix { position: absolute; inset: 0; z-index: 1; overflow: hidden; opacity: 0.25; pointer-events: none; }
  .matrix span { position: absolute; width: 2.5%; height: 5%;
    background: linear-gradient(180deg, transparent, var(--brand, #00E5FF));
    opacity: 0; animation: matrixDrop 2.4s linear infinite; }
  @keyframes matrixDrop { 0% { opacity: 0; transform: translateY(-20px); } 20% { opacity: 0.6; } 100% { opacity: 0; transform: translateY(40px); } }

  .hud-ring { position: absolute; left: 50%; top: 50%; width: 2304px; height: 2304px;
    transform: translate(-50%,-50%); border: 1px solid rgba(255,255,255,0.08); border-radius: 50%;
    z-index: 1; opacity: 0; animation: hudPulse 3s ease-in-out 0.3s forwards; pointer-events: none; }
  .hud-ring::before { content: ''; position: absolute; inset: 8%; border: 1px dashed rgba(255,255,255,0.12); border-radius: 50%; animation: hudSpin 20s linear infinite; }
  @keyframes hudPulse { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.9); } 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
  @keyframes hudSpin { 100% { transform: rotate(360deg); } }

  .particles { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .particles span { position: absolute; background: var(--brand, #00E5FF); border-radius: 50%;
    opacity: 0; box-shadow: 0 0 8px var(--brand, #00E5FF); animation: particleFloat 3s ease-in-out infinite; }
  @keyframes particleFloat { 0%,100% { opacity: 0; transform: translateY(0) scale(0.6); } 50% { opacity: 0.7; transform: translateY(-30px) scale(1); } }

  .scanline { position: absolute; inset: 0; z-index: 2; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 3px);
    opacity: 0.35; animation: scanlineMove 6s linear infinite; }
  @keyframes scanlineMove { 0% { background-position: 0 0; } 100% { background-position: 0 36px; } }

  .pulse-ring { position: absolute; left: 50%; top: 50%; width: 120px; height: 120px;
    transform: translate(-50%,-50%); border: 2px solid var(--brand, #00E5FF); border-radius: 50%;
    z-index: 1; opacity: 0.4; animation: pulseRing 2s ease-out infinite; pointer-events: none; }
  @keyframes pulseRing { 0% { transform: translate(-50%,-50%) scale(0.6); opacity: 0.6; } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }

  .speed-lines { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .speed-lines span { position: absolute; top: 0; width: 2px; height: 100%;
    background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: speedLine 1s linear infinite; }
  @keyframes speedLine { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

  .floating-docs { position: absolute; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .floating-docs span { position: absolute; width: 60px; height: 80px; border-radius: 3px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    animation: docFloat 4s ease-in-out infinite; }
  @keyframes docFloat { 0%,100% { transform: translateY(0) rotate(var(--rot,0deg)); opacity: 0.4; } 50% { transform: translateY(-18px) rotate(calc(var(--rot,0deg) + 4deg)); opacity: 0.75; } }

  .scene-0 { animation: sceneFade 30s linear 0.0s forwards; z-index: 0; }
  .scene-1 { animation: sceneZoom 30s linear 5.0s forwards; z-index: 1; }
  .scene-2 { animation: sceneSlide 30s linear 10.0s forwards; z-index: 2; }
  .scene-3 { animation: sceneSlide 30s linear 15.0s forwards; z-index: 3; }
  .scene-4 { animation: sceneSlide 30s linear 20.0s forwards; z-index: 4; }
  .scene-5 { animation: sceneZoom 30s linear 25.0s forwards; z-index: 5; }
</style>
